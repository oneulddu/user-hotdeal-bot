services:
  # Crawler + Telegram Bot service (original)
  crawler:
    image: ${HOTDEAL_IMAGE_BASE:-ghcr.io/oneulddu/user-hotdeal-bot}/crawler:latest
    build:
      context: .
      target: crawler
    container_name: user-hotdeal-bot-crawler
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./log:/app/log
      - ./dump.json:/app/dump.json
      - hotdeal-db:/app/data
    environment:
      - TZ=Asia/Seoul
      - DATABASE_URL=sqlite+aiosqlite:///./data/hotdeal.db
    depends_on:
      migrate:
        condition: service_completed_successfully

  # Alembic migration runner (one-shot)
  migrate:
    build:
      context: .
      target: base
    container_name: user-hotdeal-bot-migrate
    volumes:
      - hotdeal-db:/app/data
    environment:
      - TZ=Asia/Seoul
      - DATABASE_URL=sqlite+aiosqlite:///./data/hotdeal.db
    command: ["alembic", "upgrade", "head"]

  # FastAPI API server
  api:
    image: ${HOTDEAL_IMAGE_BASE:-ghcr.io/oneulddu/user-hotdeal-bot}/api:latest
    build:
      context: .
      target: api
    container_name: user-hotdeal-bot-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - hotdeal-db:/app/data
    environment:
      - TZ=Asia/Seoul
      - DATABASE_URL=sqlite+aiosqlite:///./data/hotdeal.db
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  hotdeal-db:
